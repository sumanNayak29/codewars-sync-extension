<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodewarsSync</title>
  <link href="popup.css" rel="stylesheet">
</head>

<body>
  <div class="header">
    <div class="header-logo">🥷</div>
    <div class="header-text">
      <h1>CodewarsSync</h1>
      <p>Auto-push solutions to GitHub</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not configured</span>
  </div>

  <div class="form">
    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="token" class="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <span class="hint">
        <a href="https://github.com/settings/tokens/new" target="_blank">Generate token</a>
        — needs <strong>repo</strong> scope
      </span>
    </div>

    <div class="field">
      <label>GitHub Username</label>
      <input type="text" id="owner" placeholder="your-username" />
    </div>

    <div class="field">
      <label>Repository Name</label>
      <input type="text" id="repo" placeholder="codewars-code-sync" />
    </div>

    <button class="btn-save" id="saveBtn">Save Settings</button>
    <div class="saved-msg" id="savedMsg"></div>
  </div>

  <div class="repo-structure">
    <h3>Repo Structure</h3>
    <div class="tree">
      <span class="folder">javascript/</span><br />
      &nbsp;&nbsp;<span class="folder">6-kyu/</span><br />
      &nbsp;&nbsp;&nbsp;&nbsp;<span class="folder">two-sum/</span><br />
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="file">solution.js</span><br />
      <span class="folder">typescript/</span><br />
      &nbsp;&nbsp;<span class="folder">5-kyu/</span><br />
      &nbsp;&nbsp;&nbsp;&nbsp;<span class="folder">some-kata/</span><br />
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="file">solution.ts</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
