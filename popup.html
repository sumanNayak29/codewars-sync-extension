<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodewarsSync</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #e8e8e8;
      }

      .header {
        background: linear-gradient(135deg, #b5111e 0%, #8b0d17 100%);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-logo {
        font-size: 22px;
      }

      .header-text h1 {
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.3px;
      }

      .header-text p {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
        margin-top: 1px;
      }

      .status-bar {
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
        padding: 8px 18px;
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        color: #888;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #888;
        flex-shrink: 0;
      }

      .status-dot.connected {
        background: #27ae60;
        box-shadow: 0 0 6px rgba(39, 174, 96, 0.5);
      }

      .status-dot.error {
        background: #e74c3c;
      }

      .form {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      label {
        font-size: 11px;
        font-weight: 600;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input {
        background: #1c1c1c;
        border: 1px solid #2e2e2e;
        border-radius: 6px;
        padding: 8px 11px;
        font-size: 13px;
        color: #e8e8e8;
        outline: none;
        transition: border-color 0.2s;
        font-family: inherit;
      }

      input::placeholder {
        color: #4a4a4a;
      }

      input:focus {
        border-color: #b5111e;
      }

      input.token-input {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 12px;
        letter-spacing: 0.5px;
      }

      .hint {
        font-size: 11px;
        color: #555;
        line-height: 1.4;
      }

      .hint a {
        color: #b5111e;
        text-decoration: none;
      }

      .hint a:hover {
        text-decoration: underline;
      }

      .btn-save {
        background: #b5111e;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        margin-top: 2px;
      }

      .btn-save:hover {
        background: #9a0e19;
      }

      .btn-save:active {
        transform: scale(0.98);
      }

      .btn-save:disabled {
        background: #3a3a3a;
        color: #666;
        cursor: not-allowed;
        transform: none;
      }

      .saved-msg {
        text-align: center;
        font-size: 12px;
        color: #27ae60;
        font-weight: 500;
        height: 16px;
      }

      .divider {
        border: none;
        border-top: 1px solid #1e1e1e;
        margin: 0 -18px;
      }

      .repo-structure {
        padding: 14px 18px;
        background: #141414;
        border-top: 1px solid #1e1e1e;
      }

      .repo-structure h3 {
        font-size: 10px;
        font-weight: 600;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 8px;
      }

      .tree {
        font-family: "SF Mono", "Fira Code", monospace;
        font-size: 11px;
        color: #4a4a4a;
        line-height: 1.7;
      }

      .tree .folder {
        color: #7a7a7a;
      }

      .tree .file {
        color: #3a7a5a;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-logo">🥷</div>
      <div class="header-text">
        <h1>CodewarsSync</h1>
        <p>Auto-push solutions to GitHub</p>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Not configured</span>
    </div>

    <div class="form">
      <div class="field">
        <label>GitHub Token</label>
        <input
          type="password"
          id="token"
          class="token-input"
          placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
        />
        <span class="hint">
          <a href="https://github.com/settings/tokens/new" target="_blank">Generate token</a>
          — needs <strong>repo</strong> scope
        </span>
      </div>

      <div class="field">
        <label>GitHub Username</label>
        <input type="text" id="owner" placeholder="your-username" />
      </div>

      <div class="field">
        <label>Repository Name</label>
        <input type="text" id="repo" placeholder="codewars-code-sync" />
      </div>

      <button class="btn-save" id="saveBtn">Save Settings</button>
      <div class="saved-msg" id="savedMsg"></div>
    </div>

    <div class="repo-structure">
      <h3>Repo Structure</h3>
      <div class="tree">
        <span class="folder">javascript/</span><br />
        &nbsp;&nbsp;<span class="folder">6-kyu/</span><br />
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="folder">two-sum/</span><br />
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="file">solution.js</span><br />
        <span class="folder">typescript/</span><br />
        &nbsp;&nbsp;<span class="folder">5-kyu/</span><br />
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="folder">some-kata/</span><br />
        &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="file">solution.ts</span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
